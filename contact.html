<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Contact – John Doe</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e2e8f0;
        }

        :root {
            --g: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 10, 15, .7);
            backdrop-filter: blur(12px);
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 700;
            background: var(--g);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 1.5rem;
            transition: .3s;
        }

        nav a:hover {
            color: white;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 120px 30px 60px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        h1 span {
            background: var(--g);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            line-height: 1.8;
            margin-bottom: 25px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        input,
        textarea {
            padding: 15px;
            border: none;
            outline: none;
            border-radius: 12px;
            background: #161622;
            color: white;
            font-size: 15px;
        }

        textarea {
            height: 170px;
            resize: vertical;
        }

        button {
            padding: 15px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: var(--g);
            color: white;
            font-size: 16px;
            font-weight: 600;
        }

        button:hover {
            opacity: .9;
        }

        .links {
            margin-top: 35px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .links a {
            color: #a5b4fc;
            text-decoration: none;
        }

        footer {
            margin-top: 80px;
            padding: 25px;
            text-align: center;
            color: #475569;
            border-top: 1px solid rgba(255, 255, 255, .08);
        }
    </style>

</head>

<body>

    <nav>

        <a class="logo" href="index.html">JD.</a>

        <div>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="index.html#work">Projects</a>
        </div>

    </nav>

    <div class="container">

        <h1>Let's <span>Connect</span></h1>

        <p>
            Interested in working together?
            Whether you have a freelance project, a full-time opportunity, or just want to say hello, I'd love to hear
            from you.
        </p>

        <form>

            <input type="text" placeholder="Your Name" required>

            <input type="email" placeholder="Email Address" required>

            <textarea placeholder="Your Message" required></textarea>

            <button type="submit">
                Send Message
            </button>

        </form>

        <div class="links">

            <a href="mailto:john@example.com">Email</a>

            <a href="#">GitHub</a>

            <a href="#">LinkedIn</a>

            <a href="#">Twitter</a>

        </div>

    </div>

    <footer>

        © 2026 John Doe · Built with passion

    </footer>

</body>

</html>
