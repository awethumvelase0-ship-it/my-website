<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>John Doe – Developer & Designer</title>
<meta name="description" content="John Doe's personal portfolio – Full-Stack Developer & Creative Designer based in New York.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#e2e8f0;overflow-x:hidden}
:root{--g:linear-gradient(135deg,#6366f1,#a855f7,#ec4899)}
nav{position:fixed;top:0;width:100%;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(12px);background:rgba(10,10,15,.7);z-index:99}
.logo{font-weight:700;font-size:1.2rem;background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
nav a{color:#94a3b8;text-decoration:none;margin-left:1.5rem;font-size:.9rem;transition:.3s}
nav a:hover{color:#fff}
#hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:2rem;position:relative}
#hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 60%,rgba(99,102,241,.15),transparent 70%)}
.avatar{width:110px;height:110px;border-radius:50%;border:3px solid transparent;background:linear-gradient(#0a0a0f,#0a0a0f) padding-box,var(--g) border-box;overflow:hidden;margin-bottom:1.5rem}
.avatar img{width:100%;height:100%;object-fit:cover}
h1{font-size:clamp(2rem,6vw,4rem);font-weight:700;line-height:1.1}
h1 span{background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#94a3b8;margin:.8rem 0 2rem;font-size:1.1rem;font-weight:300}
.btn{display:inline-block;padding:.75rem 2rem;border-radius:50px;background:var(--g);color:#fff;font-weight:500;text-decoration:none;transition:transform .3s,box-shadow .3s}
.btn:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(168,85,247,.4)}
section{padding:5rem 2rem;max-width:900px;margin:auto}
h2{font-size:2rem;font-weight:700;margin-bottom:2.5rem;text-align:center}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.2rem}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:1.5rem;transition:.3s}
.card:hover{transform:translateY(-5px);border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.07)}
.card h3{font-size:1rem;margin-bottom:.4rem}
.card p{color:#64748b;font-size:.85rem}
.skills{display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center}
.tag{padding:.4rem 1rem;border-radius:50px;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);font-size:.8rem;color:#a5b4fc}
footer{text-align:center;padding:2rem;color:#334155;font-size:.8rem;border-top:1px solid rgba(255,255,255,.05)}
.links a{color:#94a3b8;margin:0 .75rem;text-decoration:none;transition:.3s}
.links a:hover{color:#a855f7}
.btn-outline{display:inline-block;padding:.75rem 2rem;border-radius:50px;border:1px solid rgba(168,85,247,.5);color:#a5b4fc;font-weight:500;text-decoration:none;transition:.3s;margin-left:.8rem}
.btn-outline:hover{background:rgba(168,85,247,.12);border-color:#a855f7;color:#fff}
</style>
</head>
<body>
<nav>
  <a class="logo" href="index.html" style="text-decoration:none">JD.</a>
  <div><a href="#about">About</a><a href="#work">Work</a><a href="#contact">Contact</a></div>
</nav>
<div id="hero">
  <div class="avatar"><img src="https://i.pravatar.cc/110?img=12" alt="John Doe"></div>
  <h1>Hi, I'm <span>John Doe</span></h1>
  <p class="sub">Full-Stack Developer · UI/UX Designer · Open Source Enthusiast</p>
  <a href="#work" class="btn">View My Work</a><a href="about.html" class="btn-outline">About Me</a>
</div>
<section id="about">
  <h2>About Me</h2>
  <div class="skills" id="skills"></div>
</section>
<section id="work">
  <h2>Projects</h2>
  <div class="cards" id="cards"></div>
</section>
<section id="contact" style="text-align:center">
  <h2>Get In Touch</h2>
  <p style="color:#64748b;margin-bottom:1.5rem">Open to freelance, collaborations &amp; full-time roles.</p>
  <a href="mailto:john@example.com" class="btn">Say Hello 👋</a>
  <div class="links" style="margin-top:1.5rem">
    <a href="#">GitHub</a><a href="#">LinkedIn</a><a href="#">Twitter</a>
  </div>
</section>
<footer>© 2026 John Doe · Built with passion</footer>
<script>
const skills=['JavaScript','TypeScript','React','Node.js','Python','Figma','PostgreSQL','Docker','AWS','Next.js'];
document.getElementById('skills').innerHTML=skills.map(s=>`<span class="tag">${s}</span>`).join('');
const projects=[
  {t:'Nova Dashboard',d:'Analytics platform with real-time charts & dark mode UI.'},
  {t:'Pixel Studio',d:'Browser-based design tool for rapid prototyping.'},
  {t:'ChainVault',d:'Decentralized finance wallet with multi-chain support.'},
  {t:'EchoAI',d:'Conversational AI assistant powered by LLM integrations.'},
  {t:'SwiftCart',d:'E-commerce engine with headless architecture & CMS.'},
  {t:'TrailMaps',d:'Outdoor hiking app with offline GPS trail navigation.'},
];
document.getElementById('cards').innerHTML=projects.map(p=>`<div class="card"><h3>${p.t}</h3><p>${p.d}</p></div>`).join('');
document.querySelectorAll('a[href^="#"]').forEach(a=>a.addEventListener('click',e=>{e.preventDefault();document.querySelector(a.getAttribute('href'))?.scrollIntoView({behavior:'smooth'})}));
</script>
</body>
</html>
